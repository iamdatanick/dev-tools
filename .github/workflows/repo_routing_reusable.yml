name: Repo Routing (reusable)

# Reusable workflow consumers invoke as:
#   jobs:
#     check:
#       uses: iamdatanick/dev-tools/.github/workflows/repo_routing_reusable.yml@v1
#       with:
#         policy-path: tools/repo_routing_policy.yaml
#       secrets:
#         DEV_TOOLS_PAT: ${{ secrets.DEV_TOOLS_PAT }}

on:
  workflow_call:
    inputs:
      policy-path:
        description: 'Path to the consumer repo policy YAML'
        required: false
        type: string
        default: 'tools/repo_routing_policy.yaml'
      engine-ref:
        description: 'Ref (tag/branch) of dev-tools to checkout the engine from'
        required: false
        type: string
        default: 'v1.0.0'
    secrets:
      DEV_TOOLS_PAT:
        description: 'PAT with contents:read on iamdatanick/dev-tools (required since dev-tools is private)'
        required: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout dev-tools engine
        uses: actions/checkout@v4
        with:
          repository: iamdatanick/dev-tools
          ref: ${{ inputs.engine-ref }}
          path: .dev-tools
          token: ${{ secrets.DEV_TOOLS_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install pyyaml

      - name: Validate policy exists
        run: |
          if [ ! -f "${{ inputs.policy-path }}" ]; then
            echo "::error::Policy file not found at ${{ inputs.policy-path }}"
            exit 1
          fi

      - name: Run check
        id: check
        run: |
          python3 .dev-tools/routing/auto_route.py \
            --policy ${{ inputs.policy-path }} \
            --root . \
            check

      - name: Suggest fixes on failure
        if: failure()
        run: |
          echo "## Routing violations detected" >> $GITHUB_STEP_SUMMARY
          python3 .dev-tools/routing/auto_route.py \
            --policy ${{ inputs.policy-path }} \
            --root . \
            --format markdown \
            check >> $GITHUB_STEP_SUMMARY || true
