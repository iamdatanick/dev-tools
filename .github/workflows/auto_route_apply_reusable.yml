name: Auto-Route Apply (reusable)

# Pattern B: pre-merge auto-correct.
# Runs on pull_request. Applies routing rules against the PR branch.
# Pushes corrections back to the PR branch.
# Exits 0 regardless of whether changes were made (non-blocking).
#
# Consumer invocation:
#   jobs:
#     auto-route:
#       uses: iamdatanick/dev-tools/.github/workflows/auto_route_apply_reusable.yml@v1
#       with:
#         policy-path: tools/repo_routing_policy.yaml
#
# Requirements on the consumer repo:
#   - Settings -> Actions -> General -> Workflow permissions -> "Read and write permissions"
#
# Forks: workflow is skipped automatically.

on:
  workflow_call:
    inputs:
      policy-path:
        description: 'Path to the consumer repo policy YAML'
        required: false
        type: string
        default: 'tools/repo_routing_policy.yaml'
      engine-ref:
        description: 'Ref (tag/branch) of dev-tools to checkout the engine from'
        required: false
        type: string
        default: 'v1'
      commit-message:
        description: 'Commit message subject for auto-route fixups'
        required: false
        type: string
        default: 'chore(routing): auto-apply rules'

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout consumer PR branch
        uses: actions/checkout@v4
        with:
          submodules: false
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Checkout dev-tools engine
        uses: actions/checkout@v4
        with:
          repository: iamdatanick/dev-tools
          ref: ${{ inputs.engine-ref }}
          path: .dev-tools

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install pyyaml

      - name: Validate policy exists
        run: |
          if [ ! -f "${{ inputs.policy-path }}" ]; then
            echo "::warning::Policy file not found at ${{ inputs.policy-path }}; skipping auto-route"
            exit 0
          fi

      - name: Configure git for auto-route commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run auto-route (apply all rules)
        id: apply
        run: |
          set +e
          python3 .dev-tools/routing/auto_route.py --policy "${{ inputs.policy-path }}" --root . apply --allow-unrelated-dirty 2>&1 | tee /tmp/auto_route_output.txt
          set -e
          # Exclude the .dev-tools/ engine checkout dir so it doesn't leak into commits
          if git status --porcelain -- . ':!.dev-tools' | grep -q .; then
            echo "moves_made=true" >> $GITHUB_OUTPUT
            git add -A -- . ':!.dev-tools'
            git commit -m "${{ inputs.commit-message }}"
          else
            echo "moves_made=false" >> $GITHUB_OUTPUT
            echo "No routing changes needed."
          fi

      - name: Push corrections to PR branch
        if: steps.apply.outputs.moves_made == 'true'
        run: |
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
